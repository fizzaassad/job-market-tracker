name: Daily Job Scraper

on:
  schedule:
    - cron: '0 17 * * *'  # Runs every day at 10pm Pakistan time
  workflow_dispatch:  # Allows manual trigger from GitHub

jobs:
  scrape:
    runs-on: ubuntu-latest  # Uses GitHub's Linux computer

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests supabase python-dotenv pandas

      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          cd src
          python scrapper.py